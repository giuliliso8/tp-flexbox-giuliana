<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Centrado total con flex</title>
<style>
  .main{
    display:flex;
    gap: 2px;
    min-height: 100vh;
    font-family: sans-serif;
  }  
  .main .sidebar,
  .main .contenido{
    height: 100vh;
    padding: 12px 24px;
  }
  .main .sidebar{
    background: rgb(243, 107, 236);
    flex: 1;
  }
  .main .contenido{
    background: rgb(209, 49, 124);
    flex: 4;
  }

</style>
</head>
<body>
<div class="main">  
  <div class="sidebar">contenido lateral</div>
  <div class="contenido">Esto sería el contenido principal</div>
</div>  
</body>
</html>
