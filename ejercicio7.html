<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Card de texto</title>
<style>
  .card{
    display: flex;
    flex-direction: column;
    width: 400px;
    font-family: sans-serif;
    height: 300px;
    box-shadow: 0px 0px 7px 0px rgb(221, 221, 221);
    border: 0;
  }
  .cuerpo{
    flex: 4;
    padding: 8px;
  }
  .title{     
    flex: 1;
    background: rgba(216, 117, 117, 0.719);
    display: flex;
    color: white;
    align-items: center;
    justify-content: center;
  }
  h4{
    padding:0
  }
  .pie{
    flex: 1;
    background: rgb(139, 24, 24);
    display: flex;
    color: white;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
<div class="card">  
  <div class="title"><h2>Tarjeta de presentación</h2></div>
  <div class="cuerpo">Contenido del cuerpo de la tarjeta</div>
  <div class="pie"><h4>Pie de la tarjeta</h4></div>
</div>  
</body>
</html>
